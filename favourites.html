<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المفضلة - Scently</title>
    <link rel="shortcut icon" href="icons/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ecommerce.css">
    <link rel="stylesheet" href="css/favourites.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/global-nav.css">
</head>

<body class="ecommerce-body">

    <!-- Nav -->
    <div class="nav ecommerce-nav">
        <div class="scently-nav-container">
            <!-- Scently Logo (natively right-aligned due to RTL) -->
            <a href="index.html" class="logo">Scently</a>

            <!-- Nav Actions (natively left-aligned) -->
            <div class="scently-nav-actions">
                <a href="cart.html" class="scently-nav-item" title="السلة">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span class="cart-badge-count" style="display:none;">0</span>
                </a>
                <a href="index.html" class="back-link">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                    الاستمرار في التسوق
                </a>
            </div>
        </div>
    </div>

    <div class="page-container cart-container">
        <div class="fav-header">
            <h1 class="page-title">
                <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#C1E8FF" stroke-width="2">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
                قائمة المفضلة
            </h1>
            <p class="fav-subtitle" id="fav-count-text">0 عطور محفوظة</p>
        </div>

        <!-- Favourites Grid -->
        <div class="fav-grid" id="fav-grid">
            <!-- Rendered by JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-fav-state" class="empty-state" style="display:none;">
            <svg viewBox="0 0 24 24" width="80" height="80" stroke="#7DA0CA" fill="none" stroke-width="1.5">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            <h2>لا توجد عطور في المفضلة</h2>
            <p>اضغط على أيقونة القلب في أي عطر لإضافته هنا</p>
            <button class="checkout-btn" style="width:auto; margin-top: 20px; padding: 12px 40px;"
                onclick="window.location.href='fragrances.html'">
                تصفح العطور
            </button>
        </div>
    </div>

    <script src="js/cart-manager.js"></script>
    <script src="js/favourites.js"></script>
</body>

</html>
